<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Me — CEO Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&family=Source+Sans+3:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --display: 'Instrument Serif', Georgia, serif;
  --body: 'Source Sans 3', 'Segoe UI', sans-serif;
  --mono: 'IBM Plex Mono', 'Menlo', monospace;
  --bg: #0E0C0A;
  --text-primary: #F0E8DC;
  --text-body: #B0A498;
  --text-secondary: #807468;
  --text-dim: #504840;
  --warm: #E0A860;
  --green: #5EAA6E;
  --status-running: #7EC47E;
  --status-stopped: #CC9955;
  --status-planned: #666058;
  --border: rgba(255,255,255,0.05);
  --card-bg: rgba(255,255,255,0.02);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text-primary); font-family: var(--body); }
button { font-family: var(--mono); cursor: pointer; outline: none; }

@keyframes nodeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(2.2); opacity: 0; }
}

.dashboard { max-width: 1100px; margin: 0 auto; padding: 48px 36px 80px; }

/* Header */
.header h1 {
  font-family: var(--display); font-size: 44px; font-weight: 400;
  color: var(--text-primary); letter-spacing: 0.005em; line-height: 1.1; margin-bottom: 8px;
}
.header-meta {
  font-family: var(--mono); font-size: 14px; color: #6A6258;
  display: flex; gap: 12px; align-items: center;
}
.header-meta .sep { color: #3A3228; }

/* Section headers */
.section-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
}
.section-label {
  font-family: var(--mono); font-size: 13px; font-weight: 500;
  color: #A09888; text-transform: uppercase; letter-spacing: 0.12em;
}
.section-line { flex: 1; height: 1px; background: rgba(255,255,255,0.035); }

/* Topology */
.topology-canvas {
  position: relative;
  min-height: 500px;
  min-width: 0;
  background: rgba(255,255,255,0.008);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 16px;
}
.topology-scroll {
  overflow: auto;
  border-radius: 16px;
  margin-bottom: 4px;
}
.topology-canvas svg.connections {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 1;
}
.col-label {
  position: absolute; top: 10px; z-index: 3;
  font-family: var(--mono); font-size: 12px; color: #807468;
  text-transform: uppercase; letter-spacing: 0.12em;
}

/* Agent cards */
.agent-card {
  position: absolute; width: 220px; z-index: 2; cursor: pointer;
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.agent-card-inner {
  background: rgba(24,21,18,0.94);
  border: 1.5px solid rgba(212,165,116,0.18);
  border-radius: 12px; padding: 14px 16px;
  position: relative; overflow: hidden;
  backdrop-filter: blur(8px);
  transition: all 0.35s ease;
}
.agent-card.running .agent-card-inner {
  border-color: rgba(212,165,116,0.22);
}
.agent-card.dimmed .agent-card-inner {
  background: rgba(18,16,14,0.92);
  border-color: rgba(255,255,255,0.04);
}
.agent-card.highlight .agent-card-inner {
  border-color: rgba(224,180,110,0.45);
  box-shadow: 0 0 24px rgba(224,180,110,0.08);
}
.agent-card.faded { opacity: 0.25; }
.agent-card.highlight { transform: scale(1.02); }
.agent-glow {
  position: absolute; top: 0; left: 6%; right: 6%; height: 1px;
  background: linear-gradient(90deg, transparent, #C49A6C40, transparent);
}
.agent-name {
  font-family: var(--display); font-size: 20px; font-weight: 400;
  color: var(--text-primary); line-height: 1.2; letter-spacing: 0.005em;
}
.agent-meta {
  font-family: var(--mono); font-size: 13px; color: #8A8078; margin-top: 3px;
}
.agent-desc {
  font-family: var(--body); font-size: 14px; color: #9A9088;
  line-height: 1.45; margin: 8px 0;
}
.agent-status {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono); font-size: 12px;
}
.status-dot {
  position: relative; display: inline-flex; width: 9px; height: 9px;
}
.status-dot-inner {
  width: 7px; height: 7px; border-radius: 50%; margin: auto;
}
.status-dot-pulse {
  position: absolute; inset: 0; border-radius: 50%;
  background-color: var(--status-running); opacity: 0.3;
  animation: pulse 2.4s ease-in-out infinite;
}

/* File nodes */
.file-node {
  position: absolute; z-index: 2; cursor: pointer;
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.file-node.faded { opacity: 0.2; }
.file-node.highlight { transform: scale(1.04); }
.file-node-inner {
  background: rgba(24,21,18,0.88);
  border: 1.5px solid rgba(255,255,255,0.06);
  border-radius: 8px; padding: 8px 14px;
  backdrop-filter: blur(6px); white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis;
  transition: all 0.35s ease;
}
.file-node.highlight .file-node-inner {
  border-color: rgba(224,180,110,0.4);
  box-shadow: 0 0 16px rgba(224,180,110,0.06);
}
.file-node.stale .file-node-inner {
  background: rgba(196,154,108,0.05);
  border-color: rgba(196,154,108,0.16);
}
.file-name {
  font-family: var(--mono); font-size: 14px; color: #B8ACA0;
  display: flex; align-items: center; gap: 7px;
}
.file-kind { font-size: 12px; color: #5A5248; }
.file-date { font-family: var(--mono); font-size: 12px; color: #5A5248; margin-top: 4px; padding-left: 19px; }

/* Layer toggles */
.layer-toggles { display: flex; gap: 8px; align-items: center; }
.layer-toggle {
  font-size: 13px; letter-spacing: 0.03em;
  background: transparent; border: 1px solid #2A2520;
  border-radius: 20px; padding: 5px 14px;
  color: #4A4238; display: flex; align-items: center; gap: 6px;
  transition: all 0.25s ease;
}
.layer-toggle.active { background: rgba(255,255,255,0.03); }
.layer-toggle .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #2A2520; transition: background 0.25s ease;
}

/* Cards grid */
.metrics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; margin-bottom: 44px; }
.card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 12px; padding: 22px 26px;
}
.card-label {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  color: var(--text-secondary); text-transform: uppercase;
  letter-spacing: 0.1em; margin-bottom: 14px;
}
.card-big { font-family: var(--display); font-size: 48px; color: var(--text-primary); line-height: 1; }
.card-unit { font-family: var(--body); font-size: 16px; color: var(--text-secondary); margin-left: 8px; }

/* Aspect bars */
.aspect-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.aspect-name {
  width: 95px; font-family: var(--mono); font-size: 14px;
  color: #A09888; text-align: right; flex-shrink: 0;
}
.aspect-bar-bg {
  flex: 1; max-width: 140px; height: 8px;
  background: rgba(255,255,255,0.04); border-radius: 4px; overflow: hidden;
}
.aspect-bar-fill {
  height: 100%; background: linear-gradient(90deg, #A08050, var(--warm));
  border-radius: 4px;
}
.aspect-val {
  font-family: var(--mono); font-size: 14px; color: #807468; width: 34px;
}

/* Direction items */
.direction-item {
  font-family: var(--display); font-size: 19px; font-style: italic;
  color: #D0C4B4; padding: 10px 0; line-height: 1.4;
  border-top: 1px solid rgba(255,255,255,0.03);
}
.direction-item:first-child { border-top: none; }

/* Improvements */
.improvement-item {
  font-family: var(--body); font-size: 15px; color: var(--text-body);
  padding: 10px 0; line-height: 1.5;
  border-top: 1px solid rgba(255,255,255,0.025);
  display: flex; align-items: flex-start; gap: 10px;
}
.improvement-marker { color: var(--warm); flex-shrink: 0; margin-top: 3px; font-size: 13px; }

/* Sparkline */
.sparkline { display: block; }

/* Footer */
.footer {
  text-align: center; font-family: var(--mono); font-size: 12px;
  color: #3A3228; letter-spacing: 0.05em; margin-top: 48px;
}

/* Warning emphasis */
.warning { color: var(--warm); }
</style>
</head>

function getAvatar(animal, highlight) {
  const a = (animal||'').toLowerCase();
  const svg = AVATARS[a] || '';
  const colors = (AVATAR_COLORS[a] || {})[highlight ? 'glow' : 'normal'] || {};
  return svg

    .replace(/#CLASS_STROKE#/g, colors.STROKE || '#3D3530')
    .replace(/#CLASS_BODY#/g, colors.BODY || '#888')
    .replace(/#CLASS_BODY2#/g, colors.BODY2 || '#666')

    .replace(/#CLASS_IRIS#/g, colors.IRIS || '#AA8030');
}

// ─── Helpers ───
function daysAgo(d) {
  if (!d) return null;
  const now = new Date();
  const then = new Date(d);
  const nowDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const thenDate = new Date(then.getFullYear(), then.getMonth(), then.getDate());
  return Math.round((nowDate - thenDate) / 864e5);
}
function fmtAgo(d) {
  const n = daysAgo(d);
  if (n === null) return '\u2014';
  if (n === 0) return 'today';
  if (n === 1) return '1d ago';
  return n + 'd ago';
}

// ─── Topology positions (from layout.json or defaults) ───
function getTopoPositions() {
  const topo = LAYOUT.topology || {};
  const agentPos = {};
  const filePos = {};
  (topo.agents || []).forEach(a => { agentPos[a.id] = { x: a.x, y: a.y }; });
  (topo.files || []).forEach(f => { filePos[f.id] = { x: f.x, y: f.y }; });
  return { agentPos, filePos };
}

// ─── State ───
let selected = null;
let layers = { reads: true, writes: true, agents: true, files: true };

function matchFilePattern(pattern, fileId) {
  // Normalize a file pattern like "connections/scores-*.json" to match a file id like "scores"
  let fid = pattern;
  fid = fid.replace('connections/', '').replace('rubric_history/', '');
  fid = fid.replace('.yaml', '').replace('.json', '').replace('.md', '');
  fid = fid.replace(/[-_]*\*[-_]*/g, '').replace(/ memories/g, '').trim();
  fid = fid.replace(/-+$/, '').replace(/^-+/, '');
  return fileId === fid || fileId.includes(fid) || fid.includes(fileId);
}

function isConnected(entityId) {
  if (!selected) return false;
  // Check if selected is an agent and entityId is a connected file
  const agent = STATE.agents.find(a => a.id === selected);
  if (agent) {
    const flow = agent.data_flow || {};
    const reads = flow.reads_from_bus || [];
    const writes = flow.writes_to_bus || [];
    return [...reads, ...writes].some(f => matchFilePattern(f, entityId));
  }
  // Check if selected is a file and entityId is a connected agent
  const isFile = STATE.shared_files.some(f => f.id === selected);
  if (isFile) {
    const ag = STATE.agents.find(a => a.id === entityId);
    if (ag) {
      const flow = ag.data_flow || {};
      const reads = flow.reads_from_bus || [];
      const writes = flow.writes_to_bus || [];
      return [...reads, ...writes].some(f => matchFilePattern(f, selected));
    }
  }
  return false;
}

      <div class="col-label" style="left:3%">Agents</div>
      <div class="col-label" style="left:48%">Shared Bus</div>
      <div class="col-label" style="left:80%">Outputs</div>
      <svg class="connections" id="conn-svg"></svg>
      <div id="topo-nodes"></div>
    </div>
    </div>
  </section>`;

  // ═══ Metrics ═══
  const memWarn = emphasis['memory-pulse'] === 'warning' || emphasis['memory-pulse'] === 'critical';
  const scoreWarn = emphasis['scoring'] === 'warning' || emphasis['scoring'] === 'critical';
  const dirWarn = emphasis['direction'] === 'warning' || emphasis['direction'] === 'critical';

  html += `<section class="metrics-grid" style="animation:fadeIn .7s ease .5s both">`;

  // Memory Pulse
  html += `<div class="card">
    <div class="card-label">Memory Pulse</div>
    <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:12px">
      <span class="card-big">${STATE.memory.total_count}</span>
      <span class="card-unit">captured</span>
    </div>
    <canvas id="sparkline" width="160" height="36" class="sparkline"></canvas>
    <div style="margin-top:10px;font-family:var(--body);font-size:15px;color:${memWarn?'var(--warm)':'#6A6258'}">
      Last capture ${fmtAgo(STATE.memory.latest_capture)}${memWarn?' \u25CF':''}
    </div>
  </div>`;

  // Scoring
  html += `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span class="card-label" style="margin-bottom:0">Scoring</span>
      <span style="font-family:var(--mono);font-size:14px;color:${scoreWarn?'var(--warm)':'#6A6258'}">
        ${STATE.scoring.unscored_count} unscored${scoreWarn?' \u25CF':''}
      </span>
    </div>
    ${(STATE.scoring.aspects||[]).map(a => `
      <div class="aspect-row">
        <span class="aspect-name">${a.name}</span>
        <div class="aspect-bar-bg"><div class="aspect-bar-fill" style="width:${a.avg*100}%"></div></div>
        <span class="aspect-val">.${String(Math.round(a.avg*100)).padStart(2,'0')}</span>
      </div>`).join('')}
    <div style="margin-top:12px;font-family:var(--body);font-size:15px;color:#6A6258;display:flex;justify-content:space-between">
      <span>${STATE.scoring.surprise_count} surprise${STATE.scoring.surprise_count!==1?'s':''}</span>
      <span>Scored ${fmtAgo(STATE.scoring.last_run)}</span>
    </div>
  </div>`;

  // Direction
  const dir = STATE.direction || {};
  html += `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span class="card-label" style="margin-bottom:0">Growing Toward</span>
      <span style="font-family:var(--mono);font-size:13px;color:${dirWarn?'var(--warm)':'#4A4238'}">
        reviewed ${fmtAgo(dir.last_reviewed)}
      </span>
    </div>
    ${(dir.growing_toward||[]).map((item,i) =>
      `<div class="direction-item">${typeof item === 'object' ? item.description || item.name || JSON.stringify(item) : item}</div>`
    ).join('')}
  </div>`;
  html += `</section>`;

  // ═══ Improvements ═══
  const imp = STATE.improvements || {};
  html += `<section style="animation:fadeIn .7s ease .7s both;margin-bottom:48px">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <span class="card-label" style="margin-bottom:0">System Improvements</span>
        <div style="display:flex;gap:20px">
          <span style="font-family:var(--mono);font-size:14px;color:var(--warm);display:flex;align-items:center;gap:6px">
            <span style="font-family:var(--display);font-size:24px">${(imp.open||[]).length}</span>
            <span style="font-size:13px;color:#6A6258">open</span></span>
          <span style="font-family:var(--mono);font-size:14px;color:var(--green);display:flex;align-items:center;gap:6px">
            <span style="font-family:var(--display);font-size:24px">${imp.addressed||0}</span>
            <span style="font-size:13px;color:#6A6258">addressed</span></span>
          <span style="font-family:var(--mono);font-size:14px;color:#6A6258;display:flex;align-items:center;gap:6px">
            <span style="font-family:var(--display);font-size:24px">${imp.deferred||0}</span>
            <span style="font-size:13px;color:#6A6258">deferred</span></span>
        </div>
      </div>
      ${(imp.open||[]).map(item => `
        <div class="improvement-item">
          <span class="improvement-marker">\u25CB</span>
          <span>${item}</span>
        </div>`).join('')}
    </div>
  </section>`;

  // Footer
  html += `<footer class="footer">rebuilt on open \u00B7 no persistent state \u00B7 truth lives in github</footer>`;

  app.innerHTML = html;

  // Draw topology after DOM is ready
  requestAnimationFrame(() => {
    renderTopologyNodes();
    renderConnections();
    drawSparkline();
  });
}

function renderTopologyNodes() {
  const container = document.getElementById('topo-nodes');
  if (!container) return;
  const pos = getTopoPositions();
  let html = '';

  // Compute safe pixel positions to prevent card overlap
  const agentSpacing = 195;
  const fileSpacing = 72;
  const outputSpacing = 120;
  const nodeStartY = 40;
  const _centerFiles = STATE.shared_files.filter(f => f.kind !== 'output');
  const _outputFiles = STATE.shared_files.filter(f => f.kind === 'output');
  window._posPx = {};
  STATE.agents.forEach((a, i) => {
    window._posPx[a.id] = { xPct: (pos.agentPos[a.id]||{}).x || 3, yPx: nodeStartY + i * agentSpacing };
  });
  _centerFiles.forEach((f, i) => {
    window._posPx[f.id] = { xPct: (pos.filePos[f.id]||{}).x || 48, yPx: nodeStartY + i * fileSpacing };
  });
  _outputFiles.forEach((f, i) => {
    window._posPx[f.id] = { xPct: (pos.filePos[f.id]||{}).x || 80, yPx: nodeStartY + i * outputSpacing };
  });

  // Agent cards
  if (layers.agents) {
    STATE.agents.forEach((agent, i) => {
      const sp = window._posPx[agent.id] || { xPct: 3, yPx: nodeStartY + i * agentSpacing };
      const isSel = selected === agent.id;
      const conn = isConnected(agent.id);
      const highlight = isSel || conn;
      const faded = selected && !highlight;
      const statusColor = statusColors[agent.status] || '#666';
      const alive = agent.status === 'running';
      const avatarKey = agent.avatar || 'elephant';

      html += `<div class="agent-card ${agent.status} ${highlight?'highlight':''} ${faded?'faded':''}"
        style="left:${sp.xPct}%;top:${sp.yPx}px;animation:nodeIn .55s cubic-bezier(.16,1,.3,1) ${.15+i*.1}s both"
        onclick="event.stopPropagation();selectEntity('${agent.id}')">
        <div class="agent-card-inner">
          ${alive?'<div class="agent-glow"></div>':''}
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
            <div style="flex-shrink:0;line-height:0">${getAvatar(avatarKey, highlight)}</div>
            <div style="min-width:0">
              <div class="agent-name" style="font-weight:${highlight?600:400}">${agent.name}</div>
              <div class="agent-meta">${agent.version} \u00B7 ${agent.platform}</div>
            </div>
          </div>
          ${agent.description ? `<div class="agent-desc">${agent.description.substring(0,80)}${agent.description.length>80?'...':''}</div>`:''}
          <div class="agent-status">
            <div style="display:flex;align-items:center;gap:6px">
              <span class="status-dot">
                ${alive?'<span class="status-dot-pulse"></span>':''}
                <span class="status-dot-inner" style="background:${statusColor}"></span>
              </span>
              <span style="color:${statusColor};text-transform:uppercase;letter-spacing:.06em;font-size:12px">
                ${statusLabels[agent.status]||agent.status}</span>
            </div>
            ${agent.data_flow ? `<span style="color:#6A6258">${fmtAgo(STATE.memory.latest_capture)}</span>` : ''}
          </div>
        </div>
      </div>`;
    });
  }

  // File nodes
  if (layers.files) {
    STATE.shared_files.forEach((file, i) => {
      const sp = window._posPx[file.id] || { xPct: 48, yPx: nodeStartY + i * fileSpacing };
      const isSel = selected === file.id;
      const conn = isConnected(file.id);
      const highlight = isSel || conn;
      const faded = selected && !highlight;
      const age = daysAgo(file.last_updated);
      const stale = age > 14;

      html += `<div class="file-node ${highlight?'highlight':''} ${faded?'faded':''} ${stale?'stale':''}"
        style="left:${sp.xPct}%;top:${sp.yPx}px;animation:nodeIn .45s ease ${.35+i*.05}s both"
        onclick="event.stopPropagation();selectEntity('${file.id}')">
        <div class="file-node-inner">
          <div class="file-name">
            <span class="file-kind">${kindIcons[file.kind]||'\u00B7'}</span>
            <span title="${file.name}" style="color:${highlight?'#F0E0C8':stale?'#D4A870':'#B8ACA0'};font-weight:${highlight?500:400}">${file.name.length>25?file.name.replace('connections/','').replace('suggestions/',''):file.name}</span>
          </div>
          <div class="file-date" style="color:${highlight?'#A08868':stale?'#8A6E4E':'#5A5248'}">
            ${fmtAgo(file.last_updated)}${stale&&!highlight?' \u25CF':''}
          </div>
        </div>
      </div>`;
    });
  }

  container.innerHTML = html;
}

function renderConnections() {
  const svg = document.getElementById('conn-svg');
  const canvas = document.getElementById('topo-canvas');
  if (!svg || !canvas) return;
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  const pos = getTopoPositions();

  let paths = '';

  // Defs for markers
  paths += `<defs>
    <marker id="ar-r" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0.5 L7,3 L0,5.5" fill="none" stroke="#5EAA6E" stroke-width="1.2"/></marker>
    <marker id="ar-w" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0.5 L7,3 L0,5.5" fill="none" stroke="#E0A860" stroke-width="1.2"/></marker>
    <marker id="ar-rh" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0.5 L7,3 L0,5.5" fill="none" stroke="#80D090" stroke-width="1.5"/></marker>
    <marker id="ar-wh" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0.5 L7,3 L0,5.5" fill="none" stroke="#F0C070" stroke-width="1.5"/></marker>
    <marker id="ar-dim" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="6" markerHeight="4" orient="auto">
      <path d="M0,0.5 L7,3 L0,5.5" fill="none" stroke="#2D2822" stroke-width="1"/></marker>
  </defs>`;

  STATE.agents.forEach(agent => {
    const ap = window._posPx ? window._posPx[agent.id] : null;
    if (!ap) return;
    const ax = (ap.xPct/100)*w + 248;
    const ay = ap.yPx + 38;
    const flow = agent.data_flow || {};

    function drawConn(filePattern, type) {
      if (type === 'read' && !layers.reads) return;
      if (type === 'write' && !layers.writes) return;

      // Match file pattern to a shared file id
      // Handle patterns like: direction.yaml, connections/scores-*.json, *.md, rubric_history/rubric-*.yaml
      let fid = filePattern;
      // Strip path prefixes
      fid = fid.replace('connections/', '').replace('rubric_history/', '');
      // Strip extensions
      fid = fid.replace('.yaml', '').replace('.json', '').replace('.md', '');
      // Strip wildcards and date patterns
      fid = fid.replace(/[-_]*\*[-_]*/g, '').replace(/ memories/g, '').trim();
      // Remove trailing hyphens
      fid = fid.replace(/-+$/, '').replace(/^-+/, '');

      const matchedFile = STATE.shared_files.find(f => {
        // Exact match
        if (f.id === fid) return true;
        // File name contains the pattern
        if (f.name === filePattern) return true;
        // Partial matches
        if (f.id.includes(fid) || fid.includes(f.id)) return true;
        // Match by stripped name
        const fname = f.name.replace('connections/', '').replace('.yaml', '').replace('.json', '').replace('.md', '').replace(/[-_]*\*[-_]*/g, '').replace(/ memories/g, '').replace(/-+$/, '').trim();
        if (fname === fid || fname.includes(fid) || fid.includes(fname)) return true;
        return false;
      });
      if (!matchedFile) return;
      const fp = window._posPx ? window._posPx[matchedFile.id] : null;
      if (!fp) return;

      const fx = (fp.xPct/100)*w;
      const fy = fp.yPx + 16;
      const dx = Math.abs(fx-ax);
      const cp = dx*0.42;

      const agentHighlight = selected===agent.id || selected===matchedFile.id;
      const dimmed = selected && !agentHighlight;
      const isW = type==='write';
      const alive = agent.status==='running';
      const notDeployed = agent.status==='not_deployed';

      let stroke, sw, opacity, dash, marker;
      if (dimmed) {
        stroke='#1E1A16'; sw=1; opacity=0.5; dash='3,5'; marker='url(#ar-dim)';
      } else if (agentHighlight) {
        stroke=isW?'#F0C070':'#80D090'; sw=2.5; opacity=1; dash=isW?'none':'6,4';
        marker=isW?'url(#ar-wh)':'url(#ar-rh)';
      } else if (notDeployed) {
        stroke=isW?'#8A7048':'#4A7A50'; sw=1; opacity=0.45; dash='4,4';
        marker=isW?'url(#ar-w)':'url(#ar-r)';
      } else if (alive) {
        stroke=isW?'#E0A860':'#5EAA6E'; sw=1.5; opacity=0.55; dash=isW?'none':'5,4';
        marker=isW?'url(#ar-w)':'url(#ar-r)';
      } else {
        stroke=isW?'#9A8058':'#4A8A56'; sw=1.2; opacity=0.4; dash=isW?'none':'5,4';
        marker=isW?'url(#ar-w)':'url(#ar-r)';
      }

      paths += `<path d="M${ax},${ay} C${ax+cp},${ay} ${fx-cp},${fy} ${fx},${fy}"
        fill="none" stroke="${stroke}" stroke-width="${sw}" stroke-dasharray="${dash}"
        opacity="${opacity}" marker-end="${marker}" style="transition:all .35s ease"/>`;
    }

    (flow.reads_from_bus||[]).forEach(f => drawConn(f, 'read'));
    (flow.writes_to_bus||[]).forEach(f => drawConn(f, 'write'));
  });

  svg.innerHTML = paths;
}

function drawSparkline() {
  const canvas = document.getElementById('sparkline');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const data = STATE.memory.capture_frequency || [];
  if (!data.length) return;

  const w = canvas.width, h = canvas.height;
  const max = Math.max(...data.map(d => d.count), 1);
  const pts = data.map((d,i) => ({
    x: (i/(data.length-1))*w,
    y: h - (d.count/max)*(h-6) - 3
  }));

  // Area fill
  const grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0, 'rgba(224,168,96,0.2)');
  grad.addColorStop(1, 'rgba(224,168,96,0)');
  ctx.beginPath();
  pts.forEach((p,i) => i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.beginPath();
  pts.forEach((p,i) => i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle = '#E0A860'; ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke();

  // Dots
  pts.forEach((p,i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, i===pts.length-1?2.5:1.5, 0, Math.PI*2);
    ctx.fillStyle = i===pts.length-1?'#E0A860':'#7A6E5E';
    ctx.fill();
  });
}

// ─── Interaction ───
function selectEntity(id) {
  selected = selected === id ? null : id;
  renderTopologyNodes();
  renderConnections();
  // Update clear selection button visibility
  const clearBtn = document.getElementById('clear-btn');
  if (clearBtn) clearBtn.style.display = selected ? 'inline-block' : 'none';
}
function clearSelection() {
  selected = null;
  renderTopologyNodes();
  renderConnections();
  const clearBtn = document.getElementById('clear-btn');
  if (clearBtn) clearBtn.style.display = 'none';
}
function toggleLayer(key) {
  // Solo logic: clicking a toggle makes it the only active one in its group.
  // Clicking an already-solo toggle restores all in that group.
  const lineGroup = ['reads', 'writes'];
  const nodeGroup = ['agents', 'files'];
  const group = lineGroup.includes(key) ? lineGroup : nodeGroup;
  const otherKey = group.find(k => k !== key);

  if (layers[key] && !layers[otherKey]) {
    // Already solo — restore both
    layers[key] = true;
    layers[otherKey] = true;
  } else {
    // Solo this one — turn off the other
    layers[key] = true;
    layers[otherKey] = false;
  }

  renderTopologyNodes();
  renderConnections();
  // Update toggle button styles
  document.querySelectorAll('.layer-toggle').forEach(btn => {
    const k = btn.dataset.layer;
    if (k) {
      const active = layers[k];
      btn.classList.toggle('active', active);
      const dot = btn.querySelector('.dot');
      const colors = { reads:'#5EAA6E', writes:'#E0A860', agents:'#B8ACA0', files:'#B8ACA0' };
      if (dot) dot.style.background = active ? (colors[k]||'#B8ACA0') : '#2A2520';
      btn.style.borderColor = active ? (colors[k]||'#B8ACA0')+'40' : '#2A2520';
      btn.style.color = active ? (colors[k]||'#B8ACA0') : '#4A4238';
    }
  });
}

// ─── Init ───
function setCanvasSize() {
  const canvas = document.getElementById('topo-canvas');
  if (!canvas) return;
  const agentCount = STATE.agents.length;
  const centerFiles = STATE.shared_files.filter(f => f.kind !== 'output');
  const outputFiles = STATE.shared_files.filter(f => f.kind === 'output');
  // Match the spacing values used in renderTopologyNodes
  const agentBottom = 40 + (agentCount - 1) * 195 + 180; // startY + spacing + card height
  const centerBottom = 40 + (centerFiles.length - 1) * 72 + 50; // startY + spacing + node height
  const outputBottom = 40 + (outputFiles.length - 1) * 120 + 50;
  const height = Math.max(550, agentBottom + 40, centerBottom + 40, outputBottom + 40);
  canvas.style.height = height + 'px';
  canvas.style.width = canvas.parentElement.offsetWidth + 'px';
}
window.addEventListener('resize', () => { setCanvasSize(); renderConnections(); });
render();
setCanvasSize();
</script>
